version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD: webhook_password
      POSTGRES_DB: webhooks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook_user -d webhooks"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webhook-net

volumes:
  postgres_data:

networks:
  webhook-net:
    driver: bridge